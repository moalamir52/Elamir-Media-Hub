<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📡</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elamir Media Hub — by Mohamed Elamir</title>
  <meta name="description" content="Premium IPTV streaming & downloader platform by Mohamed Elamir. Watch live TV, movies, and series directly in your browser." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>

  <style>
    :root {
      /* ── Light Colorful Premium Theme ── */
      --bg-deep:    hsl(220, 30%, 98%);
      --bg-base:    hsl(220, 25%, 95%);
      --bg-card:    #ffffff;
      --bg-card2:   hsl(220, 20%, 96%);
      --bg-input:   hsl(220, 25%, 96%);

      --indigo:     hsl(242, 80%, 58%);
      --indigo-glow: hsla(242, 80%, 58%, 0.25);
      --gold:       hsl(43, 95%, 45%);
      --gold-dark:  hsl(38, 90%, 36%);
      --gold-glow:  hsla(43, 95%, 45%, 0.22);
      --cyan:       hsl(196, 85%, 38%);
      --cyan-glow:  hsla(196, 85%, 38%, 0.2);
      --red:        hsl(4, 82%, 52%);
      --red-glow:   hsla(4, 82%, 52%, 0.22);
      --green:      hsl(152, 62%, 38%);
      --purple:     hsl(270, 72%, 52%);
      --pink:       hsl(330, 80%, 55%);

      --text-main:  hsl(222, 35%, 14%);
      --text-sub:   hsl(220, 18%, 42%);
      --text-dim:   hsl(220, 12%, 62%);

      --border:     hsl(220, 18%, 88%);
      --border-strong: hsl(220, 18%, 78%);
      --border-indigo: hsla(242, 80%, 58%, 0.35);
      --border-gold:   hsla(43, 95%, 45%, 0.35);

      --glass:      rgba(255, 255, 255, 0.92);
      --blur:       saturate(160%) blur(18px);
      --shadow-sm:  0 1px 4px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md:  0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.05);
      --shadow-lg:  0 12px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
      --radius-xl:  20px;
      --radius-lg:  14px;
      --radius-md:  10px;
      --radius-sm:  6px;
      --ease:       cubic-bezier(0.4, 0, 0.2, 1);
      --font:       'Plus Jakarta Sans', system-ui, sans-serif;
      --font-title: 'Outfit', var(--font);
    }

    /* ── Dark / Night mode ── */
    html[data-theme="dark"] {
      --bg-deep:    hsl(222, 28%, 7%);
      --bg-base:    hsl(222, 24%, 10%);
      --bg-card:    hsl(222, 22%, 14%);
      --bg-card2:   hsl(222, 20%, 17%);
      --bg-input:   hsl(222, 20%, 16%);

      --indigo:     hsl(242, 85%, 70%);
      --indigo-glow: hsla(242, 85%, 70%, 0.30);
      --gold:       hsl(43, 95%, 58%);
      --gold-dark:  hsl(38, 90%, 48%);
      --gold-glow:  hsla(43, 95%, 58%, 0.25);
      --cyan:       hsl(196, 85%, 56%);
      --cyan-glow:  hsla(196, 85%, 56%, 0.25);
      --red:        hsl(4, 85%, 63%);
      --red-glow:   hsla(4, 85%, 63%, 0.28);
      --green:      hsl(152, 60%, 50%);
      --purple:     hsl(270, 78%, 68%);
      --pink:       hsl(330, 82%, 66%);

      --text-main:  hsl(220, 25%, 95%);
      --text-sub:   hsl(220, 14%, 70%);
      --text-dim:   hsl(220, 12%, 50%);

      --border:     hsl(222, 18%, 23%);
      --border-strong: hsl(222, 18%, 33%);
      --border-indigo: hsla(242, 85%, 70%, 0.4);
      --border-gold:   hsla(43, 95%, 58%, 0.4);

      --glass:      rgba(18, 22, 33, 0.92);
      --shadow-sm:  0 1px 4px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.28);
      --shadow-md:  0 4px 16px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.32);
      --shadow-lg:  0 12px 40px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.4);
    }
    html[data-theme="dark"] body {
      background-image:
        radial-gradient(ellipse 90% 60% at 15% -5%,  hsla(242, 70%, 22%, 0.55) 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 85% 105%, hsla(196, 70%, 22%, 0.45) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 65%  25%, hsla(270, 60%, 25%, 0.40) 0%, transparent 50%);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg-deep);
      background-image:
        radial-gradient(ellipse 90% 60% at 15% -5%,  hsla(242, 90%, 95%, 0.7) 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 85% 105%, hsla(196, 80%, 92%, 0.6) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 65%  25%, hsla(43,  85%, 95%, 0.5) 0%, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: hsl(220, 18%, 80%); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--indigo); }

    /* ── Layout ── */
    .app-shell { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Top Nav (Two Rows Layout) ── */
    .top-nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 0.65rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .nav-row-1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .nav-row-2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      width: 100%;
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
    }

    .brand { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; flex-shrink: 0; }
    .brand-icon { font-size: 1.65rem; filter: drop-shadow(0 0 8px var(--indigo-glow)); animation: brandPulse 3s ease-in-out infinite; }
    .brand-text { display: flex; flex-direction: column; line-height: 1; }
    .brand-name {
      font-family: var(--font-title); font-weight: 800; font-size: 1.15rem;
      background: linear-gradient(135deg, var(--indigo), var(--pink));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand-by { font-size: 0.68rem; color: var(--text-sub); font-weight: 500; letter-spacing: 0.04em; }

    .nav-tabs { display: flex; gap: 0.2rem; flex: 1; overflow-x: auto; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }

    .nav-tab {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-sub);
      font-family: var(--font); font-weight: 600; font-size: 0.875rem;
      cursor: pointer; white-space: nowrap;
      transition: all 0.2s var(--ease);
    }
    .nav-tab:hover { color: var(--text-main); background: var(--border); }
    .nav-tab.active {
      background: linear-gradient(135deg, hsla(242, 80%, 58%, 0.1), hsla(330, 80%, 55%, 0.06));
      border-color: var(--border-indigo);
      color: var(--indigo);
    }
    .nav-tab.live-tab .live-dot {
      width: 7px; height: 7px; background: var(--red);
      border-radius: 50%; box-shadow: 0 0 5px var(--red-glow);
      animation: livePulse 1.2s ease-in-out infinite;
    }
    .nav-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border-radius: var(--radius-md); border: none;
      font-family: var(--font); font-weight: 600; font-size: 0.875rem;
      cursor: pointer; transition: all 0.2s var(--ease);
    }
    .btn-indigo {
      background: linear-gradient(135deg, var(--indigo), hsl(270, 72%, 52%));
      color: #fff; box-shadow: 0 4px 14px var(--indigo-glow);
    }
    .btn-indigo:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--indigo-glow); filter: brightness(1.05); }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #fff; box-shadow: 0 4px 14px var(--gold-glow);
    }
    .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--gold-glow); filter: brightness(1.05); }
    .btn-cyan {
      background: linear-gradient(135deg, var(--cyan), hsl(180, 80%, 32%));
      color: #fff; box-shadow: 0 4px 14px var(--cyan-glow);
    }
    .btn-cyan:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .btn-ghost {
      background: var(--bg-card2);
      color: var(--text-main);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--border); border-color: var(--border-strong); }
    .btn-red {
      background: hsla(4, 82%, 52%, 0.1);
      color: var(--red);
      border: 1px solid hsla(4, 82%, 52%, 0.25);
    }
    .btn-red:hover {
      background: hsla(4, 82%, 52%, 0.18);
      border-color: hsla(4, 82%, 52%, 0.45);
    }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.78rem; }
    .btn:active { transform: translateY(0) scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    /* ── Page Body ── */
    .page-content { padding: 1.5rem; max-width: 1600px; margin: 0 auto; width: 100%; }

    /* ── Section Header ── */
    .section-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.25rem; }
    .section-title { font-family: var(--font-title); font-size: 1.3rem; font-weight: 700; color: var(--text-main); }
    .section-count { font-size: 0.85rem; color: var(--text-sub); font-weight: 500; }

    /* ── Filter Bar ── */
    .filter-bar { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .search-wrap {
      display: flex; align-items: center;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 0.4rem 0.75rem;
      flex: 1; min-width: 200px; max-width: 440px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s var(--ease);
    }
    .search-wrap:focus-within { border-color: var(--indigo); box-shadow: 0 0 0 3px var(--indigo-glow); }
    .search-icon { color: var(--text-dim); margin-right: 0.5rem; }
    .search-input { background: transparent; border: none; outline: none; color: var(--text-main); font-family: var(--font); font-size: 0.9rem; width: 100%; }
    .search-input::placeholder { color: var(--text-dim); }
    .cat-select {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-main); padding: 0.4rem 0.7rem;
      border-radius: var(--radius-md); font-family: var(--font); font-size: 0.8rem;
      outline: none; cursor: pointer; box-shadow: var(--shadow-sm);
    }
    .cat-select:focus { border-color: var(--indigo); }
    .cat-select option { background: var(--bg-card); color: var(--text-main); }

    .nav-search-filter {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem;
      flex: 1;
      max-width: 560px;
      margin: 0 0.75rem;
      justify-content: flex-end;
    }
    .nav-search-filter .search-wrap {
      flex: 1 1 150px;
      min-width: 120px;
      max-width: none;
      height: 34px;
      padding: 0 0.6rem;
      background: var(--bg-input);
    }
    .nav-search-filter .search-input { font-size: 0.82rem; }
    .nav-search-filter .cat-select {
      height: 34px;
      flex: 0 1 auto;
      min-width: 0;
      max-width: 160px;
      background: var(--bg-input);
      padding: 0 0.5rem;
      text-overflow: ellipsis;
    }
    /* "Go to #" stays small — it must not grow like the main search box */
    .nav-search-filter .chan-goto {
      flex: 0 0 108px;
      min-width: 108px;
    }
    @media (max-width: 1024px) {
      .nav-row-2 {
        flex-direction: column;
        align-items: stretch;
        gap: 0.75rem;
      }
      .nav-search-filter {
        margin: 0;
        max-width: none;
        justify-content: stretch;
      }
    }
    @media (max-width: 560px) {
      .nav-search-filter .search-wrap { flex: 1 1 100%; }
      .nav-search-filter .cat-select { flex: 1 1 calc(50% - 0.2rem); max-width: none; }
      .nav-search-filter .chan-goto { flex: 1 1 calc(50% - 0.2rem); min-width: 0; }
    }

    /* ── Media Grid ── */
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 1rem; }
    @media (min-width: 1400px) { .media-grid { grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); } }

    /* ── Media Card ── */
    .media-card {
      position: relative; border-radius: var(--radius-lg);
      overflow: hidden; background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease), border-color 0.25s var(--ease);
    }
    .media-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--border-indigo);
      box-shadow: var(--shadow-lg), 0 0 0 1px var(--border-indigo);
    }
    .card-poster {
      position: relative; width: 100%; aspect-ratio: 2/3;
      background: linear-gradient(135deg, hsl(220,20%,94%), hsl(220,20%,90%));
      overflow: hidden;
    }
    .card-poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s var(--ease); }
    .media-card:hover .card-poster img { transform: scale(1.08); }
    .card-poster-fallback {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.5rem; color: var(--text-dim);
    }
    .card-poster-fallback span { font-size: 2.5rem; }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.05) 50%, transparent 100%);
      opacity: 0; transition: opacity 0.25s var(--ease);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 0.75rem; gap: 0.4rem;
    }
    .media-card:hover .card-overlay { opacity: 1; }
    .overlay-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .card-body { padding: 0.65rem 0.75rem 0.75rem; }
    .card-title {
      font-size: 0.85rem; font-weight: 600; color: var(--text-main);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; line-height: 1.35; height: 2.3em;
    }
    .card-meta { display: flex; align-items: center; margin-top: 0.4rem; }
    .cat-badge {
      font-size: 0.68rem; font-weight: 700; padding: 0.15rem 0.45rem;
      border-radius: 999px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    }
    .cat-badge.movie  { background: hsla(43,  95%, 45%, 0.1); color: var(--gold-dark); border: 1px solid hsla(43,95%,45%,0.25); }
    .cat-badge.series { background: hsla(270, 72%, 52%, 0.1); color: var(--purple);    border: 1px solid hsla(270,72%,52%,0.25); }
    .cat-badge.live   { background: hsla(4,   82%, 52%, 0.1); color: var(--red);       border: 1px solid hsla(4,82%,52%,0.25); }
    .cat-badge.cat-name { background: hsla(242, 80%, 58%, 0.08); color: var(--indigo); border: 1px solid hsla(242,80%,58%,0.2); }

    .live-badge {
      position: absolute; top: 0.5rem; right: 2.8rem;
      display: flex; align-items: center; gap: 0.3rem;
      background: rgba(255,255,255,0.9); border: 1px solid hsla(4,82%,52%,0.4);
      padding: 0.15rem 0.45rem; border-radius: 999px;
      font-size: 0.7rem; font-weight: 700; color: var(--red);
      box-shadow: var(--shadow-sm);
    }
    .live-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; box-shadow: 0 0 5px var(--red-glow); animation: livePulse 1.2s ease-in-out infinite; }
    .ch-num {
      position: absolute; top: 0.5rem; left: 0.5rem;
      background: rgba(255,255,255,0.85); color: var(--text-sub);
      font-size: 0.68rem; font-weight: 700; padding: 0.1rem 0.35rem;
      border-radius: var(--radius-sm); box-shadow: var(--shadow-sm);
    }

    /* ── Pagination ── */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 0.35rem; flex-wrap: wrap; margin-top: 2rem; padding: 1rem 0; }
    .pg-btn {
      padding: 0.4rem 0.75rem; border-radius: var(--radius-md);
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-main); font-family: var(--font); font-weight: 600; font-size: 0.85rem;
      cursor: pointer; box-shadow: var(--shadow-sm);
      transition: all 0.2s var(--ease);
    }
    .pg-btn:hover:not(:disabled) { border-color: var(--indigo); color: var(--indigo); box-shadow: 0 2px 8px var(--indigo-glow); }
    .pg-btn.active { background: linear-gradient(135deg, var(--indigo), var(--purple)); color: #fff; border-color: transparent; box-shadow: 0 4px 12px var(--indigo-glow); }
    .pg-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .pg-info { font-size: 0.82rem; color: var(--text-sub); margin: 0 0.5rem; }

    /* ── Empty / Loading ── */
    .empty-state { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; padding: 4rem 2rem; color: var(--text-dim); }
    .empty-state-icon { font-size: 3.5rem; opacity: 0.4; }
    .spinner-wrap { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; min-height: 260px; }
    .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--indigo); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .spinner-label { color: var(--text-sub); font-size: 0.9rem; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(20, 25, 60, 0.55);
      backdrop-filter: blur(10px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.2s var(--ease); padding: 1rem;
    }
    .modal-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg), 0 0 0 1px var(--border-indigo);
      width: 100%; max-width: 780px; max-height: 90vh;
      overflow: hidden; display: flex; flex-direction: column;
      animation: scaleUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-hero {
      position: relative;
      overflow: hidden;
      height: 240px;
      background: #000;
    }
    .modal-hero-bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(20px) brightness(0.45);
      transform: scale(1.1);
      z-index: 1;
      display: block;
    }
    .modal-hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--bg-card) 0%, transparent 100%);
      z-index: 2;
    }
    .modal-hero-info {
      position: absolute;
      bottom: 1.25rem;
      left: 1.5rem;
      right: 1.5rem;
      display: flex;
      align-items: flex-end;
      gap: 1.25rem;
      z-index: 3;
    }
    .modal-hero-poster {
      width: 110px;
      height: 160px;
      border-radius: var(--radius-md);
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.85);
      box-shadow: var(--shadow-lg);
      flex-shrink: 0;
    }
    .modal-hero-details {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.75);
      min-width: 0;
      flex: 1;
    }
    .modal-type-badge {
      font-size: 0.72rem;
      font-weight: 800;
      color: #ffffff;
      background: var(--indigo);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      width: fit-content;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .modal-title {
      font-family: var(--font-title);
      font-size: 1.65rem;
      font-weight: 800;
      line-height: 1.2;
      margin: 0.2rem 0;
      color: #ffffff;
      white-space: nowrap;

      return fetch(url, options);
    };

    // Deterministic color + initials for channels/items that have no logo,
    // so each tile looks distinct instead of an identical generic icon.
    const nameToHue = (str) => {
      let hash = 0;
      for (let i = 0; i < (str || '').length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return Math.abs(hash) % 360;
    };
    const getInitials = (name) => {
      const words = (name || '').replace(/[^\p{L}\p{N}\s]/gu, '').trim().split(/\s+/).filter(Boolean);
      if (words.length === 0) return '?';
      if (words.length === 1) return words[0].slice(0, 2).toUpperCase();
      return (words[0][0] + words[1][0]).toUpperCase();
    };

    // Helper to format seconds to HH:MM:SS or MM:SS
    const formatTime = (seconds) => {
      if (isNaN(seconds) || seconds === null) return '0:00';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      return h > 0 
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${m}:${String(s).padStart(2,'0')}`;
    };

    // ────────────────────────────────────────────────────────────────
    // VideoPlayer — URL is NEVER shown to user (credentials protected)
    // ────────────────────────────────────────────────────────────────
    function VideoPlayer({ title, url, streamId, isLive, downloads, onRecord, onCancelRecord, onClose, onNext, onPrev, hasNext, hasPrev, activeTab, toast, onEnded, onPipChange }) {
      const videoRef = useRef(null);
      const hlsRef   = useRef(null);
      const [status, setStatus] = useState('loading');
      const [errMsg, setErrMsg]  = useState('');
      const [showArrows, setShowArrows] = useState(false);
      const mouseTimerRef = useRef(null);
      const [reconnecting, setReconnecting] = useState(false);   // smart reconnect overlay
      const [netSpeed, setNetSpeed] = useState(0);               // estimated Mbps
      const retryRef = useRef(0);                                // reconnect attempt counter
      const retryTimerRef = useRef(null);
      const [levels, setLevels] = useState([]);                  // available quality levels
      const [selectedLevel, setSelectedLevel] = useState(-1);    // -1 = Auto (ABR)
      const [showQuality, setShowQuality] = useState(false);
      const [pipActive, setPipActive] = useState(false);         // playing in Picture-in-Picture
      // Player extras
      const [showMore, setShowMore] = useState(false);
      const [playbackRate, setPlaybackRate] = useState(1);
      const [videoFit, setVideoFit] = useState('contain');       // contain | cover | fill
      const [sleepMin, setSleepMin] = useState(0);               // 0 = off
      const [showShortcuts, setShowShortcuts] = useState(false);
      const sleepTimerRef = useRef(null);

      // Apply playback speed (resets to 1× on each new stream)
      useEffect(() => {
        const v = videoRef.current;
        if (v) v.playbackRate = playbackRate;
      }, [playbackRate, status]);

      // Sleep timer — pause playback after the chosen number of minutes
      useEffect(() => {
        if (sleepTimerRef.current) { clearTimeout(sleepTimerRef.current); sleepTimerRef.current = null; }
        if (sleepMin > 0) {
          sleepTimerRef.current = setTimeout(() => {
            const v = videoRef.current;
            if (v) v.pause();
            if (toast) toast('😴 Sleep timer — playback paused', 'info');
            setSleepMin(0);
          }, sleepMin * 60000);
        }
        return () => { if (sleepTimerRef.current) clearTimeout(sleepTimerRef.current); };
      }, [sleepMin]);

      // Chromecast/AirPlay states & functions
      const [castState, setCastState] = useState('disconnected'); // 'disconnected', 'connecting', 'connected'

      const enterPiP = async () => {
        const v = videoRef.current;
        if (!v) return;
        try {
          if (document.pictureInPictureElement) await document.exitPictureInPicture();
          else await v.requestPictureInPicture();
        } catch (e) { toast('Picture-in-Picture is not available for this stream', 'info'); }
      };

      // Track PiP so the app can hide this overlay (to let the user browse) and
      // prompt before replacing what's playing.
      useEffect(() => {
        const v = videoRef.current;
        if (!v) return;
        const onEnter = () => { setPipActive(true); if (onPipChange) onPipChange(true); };
        const onLeave = () => { setPipActive(false); if (onPipChange) onPipChange(false); };
        v.addEventListener('enterpictureinpicture', onEnter);
        v.addEventListener('leavepictureinpicture', onLeave);
        return () => {
          v.removeEventListener('enterpictureinpicture', onEnter);
          v.removeEventListener('leavepictureinpicture', onLeave);
          if (onPipChange) onPipChange(false); // reset when the player closes
        };
      }, []);

      const pickQuality = (idx) => {
        const hls = hlsRef.current;
        if (hls) hls.currentLevel = idx; // -1 = auto ABR
        setSelectedLevel(idx);
        setShowQuality(false);
      };

      const jumpToLive = () => {
        const hls = hlsRef.current;
        const v = videoRef.current;
        if (!v) return;
        if (hls && hls.liveSyncPosition != null) v.currentTime = hls.liveSyncPosition;
        else if (v.seekable && v.seekable.length) v.currentTime = v.seekable.end(v.seekable.length - 1);
        v.play().catch(()=>{});
      };

      const handleCast = async () => {
        const video = videoRef.current;

        // The player URL is proxied through localhost, which a Cast device on the
        // network cannot reach. Ask the backend for the direct provider URL.
        let directUrl = '';
        try {
          const qs = new URLSearchParams((url || '').split('?')[1] || '');
          const t = qs.get('type'), i = qs.get('id');
          if (t && i) {
            const r = await apiFetch(`/api/direct-url?type=${encodeURIComponent(t)}&id=${encodeURIComponent(i)}`);
            if (r.ok) { const d = await r.json(); directUrl = d.url || ''; }
          }
        } catch (e) {}
        if (!directUrl) { toast('Casting is unavailable for this stream', 'info'); return; }

        // 1) Google Cast (Chrome + Chromecast on the same network)
        if (window.__castReady && window.cast && window.cast.framework) {
          try {
            const context = cast.framework.CastContext.getInstance();
            await context.requestSession(); // opens the device picker
            const session = context.getCurrentSession();
            if (!session) { toast('No cast device selected', 'info'); return; }
            const mediaInfo = new chrome.cast.media.MediaInfo(directUrl, 'application/x-mpegURL');
            mediaInfo.streamType = isLive
              ? chrome.cast.media.StreamType.LIVE
              : chrome.cast.media.StreamType.BUFFERED;
            mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
            mediaInfo.metadata.title = title;
            await session.loadMedia(new chrome.cast.media.LoadRequest(mediaInfo));
            toast('Casting "' + title + '"', 'success');
            return;
          } catch (err) {
            const code = (typeof err === 'string') ? err : (err && (err.code || err.description || err.message)) || '';
            if (code === 'cancel') return; // user closed the picker
            console.warn('Cast error', err);
            if (code === 'session_error' || code === 'receiver_unavailable' || code === 'timeout') {
              toast('No Chromecast device found on this Wi-Fi. Make sure your Chromecast / Google TV is on and on the same network.', 'error');
            } else {
              toast('Could not cast: ' + (code || 'unknown error'), 'error');
            }
            return;
          }
        }

        // 2) AirPlay (Safari / Apple devices)
        if (video && typeof video.webkitShowPlaybackTargetPicker === 'function') {
          video.webkitShowPlaybackTargetPicker();
          return;
        }

        // 3) Nothing available
        toast('Casting needs Google Chrome with a Chromecast on the same network (AirPlay works in Safari)', 'info');
      };

      useEffect(() => {
        const video = videoRef.current;

        // Google Cast session state → drives the button appearance
        let castContext = null;
        const onCastSession = (event) => {
          const S = cast.framework.SessionState;
          if (event.sessionState === S.SESSION_STARTING) setCastState('connecting');
          else if (event.sessionState === S.SESSION_STARTED || event.sessionState === S.SESSION_RESUMED) setCastState('connected');
          else if (event.sessionState === S.SESSION_ENDED) setCastState('disconnected');
        };
        if (window.cast && window.cast.framework) {
          try {
            castContext = cast.framework.CastContext.getInstance();
            castContext.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, onCastSession);
            if (castContext.getCurrentSession()) setCastState('connected');
          } catch (e) {}
        }

        // Remote Playback (AirPlay) state
        const handleStateChange = () => {
          if (video && video.remote && video.remote.state) setCastState(video.remote.state);
        };
        if (video && video.remote) {
          video.remote.addEventListener('connect', handleStateChange);
          video.remote.addEventListener('disconnect', handleStateChange);
          video.remote.addEventListener('connecting', handleStateChange);
          if (video.remote.state) setCastState(video.remote.state);
        }

        return () => {
          if (castContext) {
            try { castContext.removeEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, onCastSession); } catch (e) {}
          }
          if (video && video.remote) {
            video.remote.removeEventListener('connect', handleStateChange);
            video.remote.removeEventListener('disconnect', handleStateChange);
            video.remote.removeEventListener('connecting', handleStateChange);
          }
        };
      }, [status]);

      // Playback resume states
      const [resumePos, setResumePos] = useState(0);
      const [hasPrompted, setHasPrompted] = useState(false);
      const lastSavedRef = useRef(0);

      const activeRec = downloads ? downloads.find(d => d.id && d.id.startsWith('rec_') && d.status === 'downloading' && (d.filename.includes(title) || d.filename.includes(String(streamId)))) : null;

      const handleMouseMove = () => {
        setShowArrows(true);
        if (mouseTimerRef.current) {
          clearTimeout(mouseTimerRef.current);
        }
        mouseTimerRef.current = setTimeout(() => {
          setShowArrows(false);
        }, 3000);
      };

      const handleMouseLeave = () => {
        setShowArrows(false);
        if (mouseTimerRef.current) {
          clearTimeout(mouseTimerRef.current);
        }
      };

      useEffect(() => {
        return () => {
          if (mouseTimerRef.current) clearTimeout(mouseTimerRef.current);
        };
      }, []);

      // Fetch saved position on mount
      useEffect(() => {
        if (isLive || !streamId) return;
        apiFetch(`/api/playback-position?id=${streamId}`)
          .then(r => r.json())
          .then(data => {
            if (data && data.position > 10) {
              setResumePos(data.position);
            }
          }).catch(()=>{});
      }, [streamId, isLive]);

      useEffect(() => {
        const video = videoRef.current;
        if (!video || !url) return;
        retryRef.current = 0;
        setReconnecting(false);
        const cleanup = () => {
          if (retryTimerRef.current) { clearTimeout(retryTimerRef.current); retryTimerRef.current = null; }
          if (hlsRef.current) { hlsRef.current.destroy(); hlsRef.current = null; }
        };

        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          // A healthy buffer keeps playback smooth (fewer cuts). The "🔴 LIVE"
          // button lets the user jump back to the edge when they want low delay.
          // maxBufferSize is raised well above the 60MB default so high-bitrate
          // streams (4K ≈ 40+ Mbps) can build a real cushion of seconds instead of
          // hitting the byte cap after ~10s and stuttering.
          const hls = new Hls(isLive ? {
            enableWorker: true,
            lowLatencyMode: false,
            liveSyncDurationCount: 4,
            maxBufferLength: 30,
            maxMaxBufferLength: 120,
            maxBufferSize: 200 * 1000 * 1000,
            backBufferLength: 30
          } : {
            enableWorker: true,
            maxBufferLength: 40,
            maxBufferSize: 200 * 1000 * 1000
          });
          hlsRef.current = hls;
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            retryRef.current = 0;
            setReconnecting(false);
            setStatus('playing');
            setLevels(hls.levels || []);
            setSelectedLevel(-1);
            video.play().catch(()=>{});
          });
          // Once data is flowing again, clear the "Reconnecting" state and reset the
          // failure counter (so only *consecutive* failures count toward giving up).
          hls.on(Hls.Events.FRAG_BUFFERED, () => {
            retryRef.current = 0;
            setReconnecting(false);
          });
          hls.on(Hls.Events.ERROR, (_, data) => {
            if (!data.fatal) return;
            if (retryRef.current < 8) {
              retryRef.current += 1;
              setReconnecting(true);
              if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                try { hls.recoverMediaError(); return; } catch(e) {}
              }
              const delay = Math.min(800 * retryRef.current, 4000);
              retryTimerRef.current = setTimeout(() => {
                try { hls.startLoad(); } catch(e) {
                  try { hls.destroy(); } catch(e2){}
                  hlsRef.current = null;
                }
              }, delay);
            } else {
              setReconnecting(false);
              setStatus('error');
              setErrMsg(`Stream error (${data.type}) — gave up after several retries`);
            }
          });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
          video.addEventListener('loadedmetadata', () => {
            setStatus('playing');
            video.play().catch(()=>{});
          });
          video.addEventListener('error', () => { setStatus('error'); setErrMsg('Native playback failed.'); });
        } else {
          setStatus('error');
          setErrMsg('HLS is not supported in this browser.');
        }
        return cleanup;
      }, [url]);

      // Live network-speed estimate (from hls.js bandwidth estimate)
      useEffect(() => {
        const iv = setInterval(() => {
          const hls = hlsRef.current;
          if (hls && hls.bandwidthEstimate) {
            setNetSpeed(hls.bandwidthEstimate / 1e6); // bits → Mbps
          }
        }, 2000);
        return () => clearInterval(iv);
      }, []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          const video = videoRef.current;
          if (!video) return;

          const active = document.activeElement;
          if (active && (active.tagName === 'INPUT' || active.tagName === 'SELECT' || active.tagName === 'TEXTAREA')) {
            return;
          }

          if (e.key === 'Escape') {
            onClose();
          } else if (e.key === ' ' || e.key === 'Spacebar') {
            e.preventDefault();
            if (video.paused) {
              video.play().catch(() => {});
            } else {
              video.pause();
            }
          } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            if (isLive) {
              if (onPrev && hasPrev) onPrev();
            } else {
              video.currentTime = Math.max(0, video.currentTime - 10);
            }
          } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            if (isLive) {
              if (onNext && hasNext) onNext();
            } else {
              video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
            }
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            video.volume = Math.min(1.0, video.volume + 0.1);
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            video.volume = Math.max(0.0, video.volume - 0.1);
          }
        };

        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [onClose, isLive, onNext, onPrev, hasNext, hasPrev]);

      // Throttle progress saving on timeupdate
      const handleTimeUpdate = () => {
        const video = videoRef.current;
        if (!video || isLive || !streamId) return;
        const cur = video.currentTime;
        const dur = video.duration;
        if (Math.abs(cur - lastSavedRef.current) > 5) {
          lastSavedRef.current = cur;
          apiFetch('/api/playback-position', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              stream_id: String(streamId),
              position: cur,
              duration: dur || 0,
              title: title,
              type: activeTab === 'series' ? 'series' : 'movie'
            })
          }).catch(()=>{});
        }
      };

      return h('div', { className: 'player-backdrop', onMouseMove: handleMouseMove, onMouseLeave: handleMouseLeave, style: { display: pipActive ? 'none' : 'flex' } },
        h('div', { className: 'player-header' },
          h('div', { className: 'player-title' }, '▶ ' + title),
          h('div', { style: { display: 'flex', gap: '0.5rem', alignItems: 'center' } },
            netSpeed > 0 && h('div', {
              title: 'Estimated network speed',
              style: {
                display: 'flex', alignItems: 'center', gap: '0.3rem',
                color: '#fff', fontSize: '0.78rem', fontWeight: 700,
                background: 'rgba(255,255,255,0.12)', border: '1px solid rgba(255,255,255,0.2)',
                borderRadius: '999px', padding: '0.25rem 0.6rem'
              }
            }, '📶 ' + (netSpeed >= 1 ? netSpeed.toFixed(1) + ' Mbps' : (netSpeed * 1000).toFixed(0) + ' Kbps')),
            isLive && status === 'playing' && h('button', {
              className: 'btn btn-ghost btn-sm',
              style: { color:'#fff', background:'rgba(255,71,87,0.22)', border:'1px solid rgba(255,71,87,0.5)', display:'flex', alignItems:'center', gap:'0.3rem' },
              onClick: jumpToLive,
              title: 'Jump to the live edge (lowest delay)'
            }, h('div',{className:'live-dot'}), 'LIVE'),
            levels.length > 1 && h('div', { style: { position:'relative' } },
              h('button', {
                className: 'btn btn-ghost btn-sm',
                style: { color:'#fff', background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.2)' },
                onClick: () => setShowQuality(s => !s),
                title: 'Video quality'
              }, '⚙ ' + (selectedLevel === -1 ? 'Auto' : (levels[selectedLevel] && levels[selectedLevel].height ? levels[selectedLevel].height + 'p' : 'Q'))),
              showQuality && h('div', {
                style: {
                  position:'absolute', top:'110%', right:0, zIndex:30,
                  background:'rgba(20,24,33,0.98)', border:'1px solid rgba(255,255,255,0.15)',
                  borderRadius:'var(--radius-md)', padding:'0.3rem', minWidth:'130px',
                  boxShadow:'0 8px 24px rgba(0,0,0,0.5)', display:'flex', flexDirection:'column', gap:'0.15rem'
                }
              },
                h('button', {
                  className:'btn btn-sm', style:{justifyContent:'flex-start', color:'#fff', background: selectedLevel===-1?'rgba(99,102,241,0.4)':'transparent', border:'none'},
                  onClick:()=>pickQuality(-1)
                }, 'Auto'),
                levels.map((lv, i) => h('button', {
                  key:i, className:'btn btn-sm',
                  style:{justifyContent:'flex-start', color:'#fff', background: selectedLevel===i?'rgba(99,102,241,0.4)':'transparent', border:'none'},
                  onClick:()=>pickQuality(i)
                }, (lv.height ? lv.height + 'p' : Math.round((lv.bitrate||0)/1000) + 'k')))
              )
            ),
            h('div', { style: { position:'relative' } },
              h('button', {
                className: 'btn btn-ghost btn-sm',
                style: { color:'#fff', background: (playbackRate!==1||videoFit!=='contain'||sleepMin>0) ? 'rgba(99,102,241,0.4)' : 'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.2)' },
                onClick: () => setShowMore(s => !s),
                title: t('more')
              }, '⋯ ' + t('more')),
              showMore && h('div', {
                style: {
                  position:'absolute', top:'110%', right:0, zIndex:30,
                  background:'rgba(20,24,33,0.98)', border:'1px solid rgba(255,255,255,0.15)',
                  borderRadius:'var(--radius-md)', padding:'0.6rem', minWidth:'220px',
                  boxShadow:'0 8px 24px rgba(0,0,0,0.5)', display:'flex', flexDirection:'column', gap:'0.6rem',
                  maxHeight:'72vh', overflowY:'auto'
                }
              },
                !isLive && h('div', null,
                  h('div', { style:{color:'rgba(255,255,255,0.5)',fontSize:'0.68rem',fontWeight:700,marginBottom:'0.3rem',letterSpacing:'0.05em'} }, '⏩ PLAYBACK SPEED'),
                  h('div', { style:{display:'flex',flexWrap:'wrap',gap:'0.25rem'} },
                    [0.5,0.75,1,1.25,1.5,1.75,2].map(r => h('button', {
                      key:r, className:'btn btn-sm',
                      style:{padding:'0.2rem 0.45rem',color:'#fff',border:'none',background: playbackRate===r?'rgba(99,102,241,0.6)':'rgba(255,255,255,0.08)'},
                      onClick:()=>setPlaybackRate(r)
                    }, r+'×'))
                  )
                ),
                h('div', null,
                  h('div', { style:{color:'rgba(255,255,255,0.5)',fontSize:'0.68rem',fontWeight:700,marginBottom:'0.3rem',letterSpacing:'0.05em'} }, '🖼️ SCREEN FIT'),
                  h('div', { style:{display:'flex',gap:'0.25rem'} },
                    [['contain','Fit'],['cover','Fill'],['fill','Stretch']].map(o => h('button', {
                      key:o[0], className:'btn btn-sm',
                      style:{flex:1,padding:'0.25rem',color:'#fff',border:'none',background: videoFit===o[0]?'rgba(99,102,241,0.6)':'rgba(255,255,255,0.08)'},
                      onClick:()=>setVideoFit(o[0])
                    }, o[1]))
                  )
                ),
                h('div', null,
                  h('div', { style:{color:'rgba(255,255,255,0.5)',fontSize:'0.68rem',fontWeight:700,marginBottom:'0.3rem',letterSpacing:'0.05em'} }, '😴 SLEEP TIMER'),
                  h('div', { style:{display:'flex',flexWrap:'wrap',gap:'0.25rem'} },
                    [[0,'Off'],[15,'15m'],[30,'30m'],[45,'45m'],[60,'60m'],[90,'90m']].map(o => h('button', {
                      key:o[0], className:'btn btn-sm',
                      style:{padding:'0.2rem 0.45rem',color:'#fff',border:'none',background: sleepMin===o[0]?'rgba(99,102,241,0.6)':'rgba(255,255,255,0.08)'},
                      onClick:()=>setSleepMin(o[0])
                    }, o[1]))
                  )
                ),
                h('button', {
                  className:'btn btn-sm',
                  style:{color:'#fff',background:'rgba(255,255,255,0.08)',border:'none',justifyContent:'flex-start'},
                  onClick:()=>{ setShowShortcuts(true); setShowMore(false); }
                }, '⌨️ Keyboard Shortcuts')
              )
            ),
            h('button', {
              className: 'btn btn-ghost btn-sm',
              style: {
                color: '#fff',
                background: castState === 'connected'
                  ? 'linear-gradient(135deg, var(--indigo), var(--purple))'
                  : castState === 'connecting'
                    ? 'rgba(241, 196, 15, 0.35)'
                    : 'rgba(255,255,255,0.12)',
                border: castState === 'connected'
                  ? 'none'
                  : '1px solid rgba(255,255,255,0.2)',
                display: 'flex',
                alignItems: 'center',
                gap: '0.35rem',
                boxShadow: castState === 'connected' ? '0 2px 10px var(--indigo-glow)' : 'none'
              },
              onClick: handleCast,
              title: 'Cast to Chromecast or AirPlay device'
            }, 
              castState === 'connected' ? '🟢 ' + t('casting') : castState === 'connecting' ? '⏳ ' + t('connectingCast') : '📺 ' + t('cast')
            ),
            h('button', { className: 'btn btn-ghost btn-sm', style:{color:'#fff',background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.2)'}, onClick: enterPiP, title: 'Picture-in-Picture' }, '🗗 ' + t('mini')),
            h('button', { className: 'btn btn-ghost btn-sm', style:{color:'#fff',background:'rgba(255,255,255,0.12)',border:'1px solid rgba(255,255,255,0.2)'}, onClick: onClose }, '✕ ' + t('close'))
          )
        ),
        h('div', { className: 'player-video-wrap', style: { position: 'relative', width: '100%', height: '100%' } },
          status === 'loading' && h('div', { className: 'player-loading' },
            h('div', { className: 'spinner', style:{borderTopColor:'white'} }),
            h('span', null, t('connecting'))
          ),
          reconnecting && status !== 'error' && h('div', {
            style: {
              position: 'absolute', top: '1rem', left: '50%', transform: 'translateX(-50%)',
              display: 'flex', alignItems: 'center', gap: '0.5rem', zIndex: 20,
              background: 'rgba(0,0,0,0.7)', color: '#fff', padding: '0.5rem 1rem',
              borderRadius: '999px', fontSize: '0.85rem', fontWeight: 600
            }
          },

    // ── Download Item ──
    function DlItem({ dl, onCancel, onClear, onResume }) {
      const done   = ['completed','failed','cancelled'].includes(dl.status);
      const isRec  = dl.id && dl.id.startsWith('rec_');
      const badge  = isRec ? 'recording' : dl.status;
      const label  = isRec && dl.status === 'downloading' ? '⏺ REC' : dl.status.toUpperCase();
      const showProg = !isRec && dl.progress >= 0;
      const canResume = ['failed', 'cancelled'].includes(dl.status) && !isRec;

      const sizeLabel = dl.total_size_mb > 0 
        ? `${dl.downloaded_mb} / ${dl.total_size_mb} MB`
        : `${dl.downloaded_mb} MB`;

      return h('div', { className: 'dl-item' },
        h('span', { className: 'dl-filename', title: dl.filename }, dl.filename),
        showProg && h('div', { className: 'dl-progress-wrap' },
          h('div', { className: 'dl-track' }, h('div', { className: 'dl-fill', style:{width:`${dl.progress}%`} })),
          h('div', { className: 'dl-pct' }, `${dl.progress}%`)
        ),
        !isRec && h('span', { className: 'dl-speed', style: { fontWeight: 600, color: 'var(--indigo)' } }, sizeLabel),
        isRec && dl.status === 'downloading' && h('span', {className:'dl-speed'}, `${dl.downloaded_mb} MB`),
        h('span', { className: `dl-status-badge ${badge}` }, label),
        dl.speed_mb_s > 0 && !isRec && h('span', { className: 'dl-speed' }, `${dl.speed_mb_s.toFixed(1)} MB/s`),
        !done && h('button', { className: 'btn btn-ghost btn-sm', style:{color:'var(--red)',borderColor:'hsla(4,82%,52%,0.3)'}, onClick: () => onCancel(dl.id) }, '⏹ Stop'),
        canResume && h('button', { className: 'btn btn-indigo btn-sm', style:{padding:'0.3rem 0.6rem',fontSize:'0.75rem'}, onClick: () => onResume(dl) }, '🔄 Resume'),
        done && h('button', { className: 'btn btn-ghost btn-sm', style:{color:'var(--text-sub)',borderColor:'var(--border)'}, onClick: () => onClear(dl.id) }, '✕ Clear')
      );
    }

    // ── Download Bar ──
    function DownloadBar({ downloads, onCancel, onClear, onResume }) {
      const [minimized, setMinimized] = useState(false);
      const activeCount = downloads.filter(d => ['downloading', 'recording'].includes(d.status) || (d.id && d.id.startsWith('rec_') && d.status === 'downloading')).length;

      return h('div', { className: `dl-bar ${minimized ? 'minimized' : ''}` },
        h('div', { className: 'dl-bar-header', onClick: () => setMinimized(!minimized) },
          h('div', { className: 'dl-title' },
            h('span', null, '⬇ Downloads & Recordings'),
            activeCount > 0 && h('span', { style: { padding: '0.1rem 0.4rem', background: 'var(--indigo)', color: '#fff', borderRadius: '4px', fontSize: '0.7rem', marginLeft: '0.5rem' } }, activeCount)
          ),
          h('button', {
            className: 'dl-minimize-btn',
            onClick: (e) => {
              e.stopPropagation();
              setMinimized(!minimized);
            }
          }, minimized ? 'Expand ⏶' : 'Minimize ⏷')
        ),
        !minimized && h('div', { className: 'dl-list' },
          downloads.map(dl => h(DlItem, { key: dl.id, dl, onCancel, onClear, onResume }))

    // ── Library Item ──
    function LibraryItem({ item, onWatch, onDelete, onClear }) {
      const formatDate = (ts) => {
        const d = new Date(ts * 1000);
        return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      };

      return h('div', { className: 'library-item' },
        h('div', { className: 'lib-info' },
          h('span', { className: 'lib-title', title: item.name }, item.name),
          h('div', { className: 'lib-meta' },
            h('span', { className: 'lib-size' }, `${item.size_mb} MB`),

          h('button', { className: 'btn btn-cyan btn-sm', onClick: onWatch }, '▶ Play'),
          h('button', { className: 'btn btn-ghost btn-sm', style: { color: 'var(--red)', borderColor: 'hsla(4,82%,52%,0.3)' }, onClick: onDelete }, '🗑️ Delete'),
          h('button', { className: 'btn btn-ghost btn-sm', style: { color: 'var(--text-sub)', borderColor: 'var(--border)' }, onClick: onClear }, '✕ Clear List')

    // ── Pagination ──
    function Pagination({ page, pages, total, onPage }) {
      if (total === 0 || pages <= 1) return null;
      const range = 3;
      const s = Math.max(1, page - range), e = Math.min(pages, page + range);
      const btns = [];
      if (s > 1) { btns.push(h('button', {key:1, className:'pg-btn', onClick:()=>onPage(1)}, '1')); if(s>2) btns.push(h('span',{key:'ds',style:{color:'var(--text-dim)',padding:'0 0.2rem'}},'…')); }
      for (let i = s; i <= e; i++) btns.push(h('button', {key:i, className:`pg-btn ${page===i?'active':''}`, onClick:()=>onPage(i)}, i));
      if (e < pages) { if(e<pages-1) btns.push(h('span',{key:'de',style:{color:'var(--text-dim)',padding:'0 0.2rem'}},'…')); btns.push(h('button',{key:pages,className:'pg-btn',onClick:()=>onPage(pages)},pages)); }
      return h('div', { className: 'pagination' },
        h('button', {className:'pg-btn', onClick:()=>onPage(page-1), disabled:page===1}, '◀'),
        ...btns,
        h('button', {className:'pg-btn', onClick:()=>onPage(page+1), disabled:page===pages}, '▶'),
        h('span', {className:'pg-info'}, `${page} / ${pages} — ${total.toLocaleString()} items`)
      );
    }

    // ── Series Modal ──
    function SeriesModal({ item, creds, catName, isFav, onToggleFav, onClose, onDownload, onDownloadSeries, onCopyLink, onWatch, onSelectCategory }) {
      const [seasons, setSeasons]   = useState([]);
      const [activeSeason, setAS]   = useState('');
      const [episodes, setEpisodes] = useState([]);
      const [allEps, setAllEps]     = useState({});
      const [loading, setLoading]   = useState(true);

      // Each season downloads into its own subfolder: "Series Name/Season X"
      const seasonEpisodes = (s) => (allEps[s] || []).map(ep => {
        const code = `S${String(s).padStart(2,'0')}E${String(ep.episode_num||ep.id||0).padStart(2,'0')}`;
        return { id: ep.id, filename: `${item.name} - ${code}`, subfolder: `${item.name}/Season ${s}` };
      });
      const buildAllEpisodes = () => seasons.reduce((list, s) => list.concat(seasonEpisodes(s)), []);
      const totalEpisodes = seasons.reduce((n, s) => n + ((allEps[s]||[]).length), 0);

      useEffect(() => {
        const sid = item.series_id || item.id;  // Recent items store the id as "id"
        apiFetch(`/api/series-info?id=${encodeURIComponent(sid)}`)
          .then(r => r.json())
          .then(data => {
            const s = Object.keys(data.episodes || {});
            setAllEps(data.episodes || {}); setSeasons(s);
            if (s.length) {
              // Reopen on the last-watched season when coming from Recent
              const start = (item.season != null && s.includes(String(item.season))) ? String(item.season) : s[0];
              setAS(start); setEpisodes(data.episodes[start] || []);
            }
          }).catch(()=>{}).finally(()=>setLoading(false));
      }, [item.series_id, item.id]);

      useEffect(() => {
        const fn = e => { if (e.key==='Escape') onClose(); };
        document.addEventListener('keydown', fn);
        return () => document.removeEventListener('keydown', fn);
      }, []);

      const streamUrl = (epId) => streamSrc('series', epId);
      
      const seriesCover = item.stream_icon || item.cover;

      return h('div', { className: 'modal-backdrop', onClick: onClose },
        h('div', { className: 'modal-box', onClick: e => e.stopPropagation(), style:{maxWidth:'820px'} },
          h('div', { className: 'modal-hero' },
            seriesCover && h('img', {src:seriesCover, className:'modal-hero-bg-img', onError:e=>e.target.style.display='none'}),
            h('div', {className:'modal-hero-gradient'}),
            h('div', {className:'modal-hero-info'},
              seriesCover && h('img', {src:seriesCover, className:'modal-hero-poster', onError:e=>e.target.style.display='none'}),
              h('div', {className:'modal-hero-details'},
                h('div', {style:{display:'flex',alignItems:'center',gap:'0.5rem'}},
                  h('div', {className:'modal-type-badge'}, '📺 TV Series'),
                  h('button', {
                    className: `btn btn-sm ${isFav ? 'btn-red' : 'btn-ghost'}`,
                    style: { padding: '0.15rem 0.5rem', fontSize: '0.75rem', color: isFav ? '#ff4757' : '#fff', borderColor: isFav ? '#ff4757' : 'rgba(255,255,255,0.4)', background: 'rgba(0,0,0,0.4)' },
                    onClick: onToggleFav
                  }, isFav ? '❤️ ' + t('favorite') : '🤍 ' + t('addFavorite'))
                ),
                h('h2', {className:'modal-title'}, item.name),
                catName && h('div', {
                  className:'modal-cat-label',
                  onClick: () => onSelectCategory(item.category_id, 'series')
                }, '📂 ' + catName)
              )
            ),
            h('button', {className:'modal-close', onClick:onClose}, '✕')
          ),
          h('div', {className:'modal-body'},
            loading
              ? h('div', {style:{display:'flex',justifyContent:'center',padding:'2rem'}}, h('div',{className:'spinner'}))
              : h('div', null,
                  totalEpisodes > 0 && h('div', {style:{display:'flex',gap:'0.5rem',justifyContent:'flex-end',flexWrap:'wrap',marginBottom:'0.75rem'}},
                    activeSeason && (allEps[activeSeason]||[]).length > 0 && h('button', {
                      className:'btn btn-ghost btn-sm',
                      onClick:()=>onDownloadSeries(`${item.name} - Season ${activeSeason}`, seasonEpisodes(activeSeason)),
                      title:`Download all of Season ${activeSeason} into its own folder`
                    }, `⬇ Download Season ${activeSeason} (${(allEps[activeSeason]||[]).length})`),
                    seasons.length > 1 && h('button', {
                      className:'btn btn-gold btn-sm',
                      onClick:()=>onDownloadSeries(item.name, buildAllEpisodes()),
                      title:'Queue every episode of every season (each season in its own folder)'
                    }, `⬇ Full Series (${totalEpisodes} eps, ${seasons.length} seasons)`),
                    seasons.length === 1 && h('button', {
                      className:'btn btn-gold btn-sm',
                      onClick:()=>onDownloadSeries(item.name, buildAllEpisodes()),
                      title:'Queue every episode for download'
                    }, `⬇ Download All (${totalEpisodes} eps)`)
                  ),
                  seasons.length > 0 && h('div', {className:'seasons-tabs'},
                    seasons.map(s => h('button', {key:s, className:`season-btn ${activeSeason===s?'active':''}`, onClick:()=>{setAS(s);setEpisodes(allEps[s]||[]);}}, `Season ${s}`))
                  ),
                  h('div', {className:'ep-list'},
                    episodes.length
                      ? episodes.map((ep, idx) => {
                          const code = `S${String(activeSeason).padStart(2,'0')}E${String(ep.episode_num||ep.id||0).padStart(2,'0')}`;
                          const title = ep.title || `Episode ${ep.episode_num || ep.id}`;
                          const fname = `${item.name} - ${code}`;
                          return h('div', {key:ep.id, className:'ep-row'},
                            h('div', {className:'ep-info'},
                              h('span', {className:'ep-num'}, code),
                              h('span', {className:'ep-title'}, title)
                            ),
                            h('div', {className:'ep-actions'},
                              h('button', {className:'btn btn-cyan btn-sm', onClick:()=>onWatch(idx, episodes, activeSeason)}, '▶'),
                              h('button', {className:'btn btn-gold btn-sm', onClick:()=>onDownload('series', ep.id, fname, null)}, '⬇')
                            )

                      : h('p', {style:{color:'var(--text-dim)',textAlign:'center',padding:'1.5rem'}}, 'No episodes found.')

      // Stream checker states
      const [streamHealth, setStreamHealth] = useState(null); // 'online', 'offline', null
      const [checkingHealth, setCheckingHealth] = useState(false);

      const handleCheckHealth = async (e) => {
        if (e) e.stopPropagation();
        setCheckingHealth(true);
        const streamId = item.stream_id || item.id;
        try {
          const r = await apiFetch(`/api/check-stream?id=${streamId}`);
          if (r.ok) {
            const d = await r.json();
            setStreamHealth(d.online ? 'online' : 'offline');
          } else {
            setStreamHealth('offline');
          }
        } catch(err) {
          setStreamHealth('offline');
        } finally {
          setCheckingHealth(false);
        }

        if (type === 'live' && autoCheck) {

    // ── Multi-View player slot ──
    function MultiViewPlayer({ slotIdx, channel, creds, onRemove }) {
      const videoRef = useRef(null);
      const hlsRef = useRef(null);
      const [isMuted, setIsMuted] = useState(true);
      const [volume, setVolume] = useState(1);
      const [status, setStatus] = useState('loading');
      const retryRef = useRef(0);
      const retryTimerRef = useRef(null);

      // Slots from the channel picker carry stream_id (live); slots created from the
      // PiP "Switch to Multi-View" flow carry a ready-made url (any content type).
      const streamUrl = channel.url || streamSrc('live', channel.stream_id);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        retryRef.current = 0;
        const cleanup = () => {
          if (retryTimerRef.current) { clearTimeout(retryTimerRef.current); retryTimerRef.current = null; }
          if (hlsRef.current) {
            hlsRef.current.destroy();
            hlsRef.current = null;
          }
        };

        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          const hls = new Hls({ enableWorker: true, lowLatencyMode: false, maxBufferLength: 30, maxBufferSize: 200 * 1000 * 1000 });
          hlsRef.current = hls;
          hls.loadSource(streamUrl);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            retryRef.current = 0;
            setStatus('playing');
            video.play().catch(()=>{});
          });
          hls.on(Hls.Events.ERROR, (_, data) => {
            if (!data.fatal) return;
            // A second stream can fail to start while the first connection is still
            // being released — retry with backoff before giving up.
            if (retryRef.current < 6) {
              retryRef.current += 1;
              setStatus('loading');
              if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                try { hls.recoverMediaError(); return; } catch(e) {}
              }
              retryTimerRef.current = setTimeout(() => {
                try { hls.startLoad(); } catch(e) {}
              }, Math.min(1500 * retryRef.current, 6000));
            } else {
              setStatus('error');
            }
          });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = streamUrl;
          video.addEventListener('loadedmetadata', () => {
            setStatus('playing');
            video.play().catch(()=>{});
          });
          video.addEventListener('error', () => {
            setStatus('error');
          });
        } else {
          setStatus('error');
        }

        return cleanup;
      }, [streamUrl]);

      useEffect(() => {
        const video = videoRef.current;
        if (video) {
          video.muted = isMuted;
          video.volume = volume;
        }
      }, [isMuted, volume]);

      return h('div', { style: { width: '100%', height: '100%', position: 'relative', background: '#000' } },
        h('div', { className: 'slot-title-tag' }, channel.name),
        status === 'loading' && h('div', { style: { position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'rgba(255,255,255,0.6)', background: 'rgba(0,0,0,0.5)' } },
          h('div', { className: 'spinner', style: { width: '24px', height: '24px', borderWidth: '2px', borderTopColor: 'white' } })
        ),
        status === 'error' && h('div', { style: { position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: '#e74c3c', background: '#000', padding: '1rem', fontSize: '0.8rem' } },
          h('span', { style: { fontSize: '1.5rem', marginBottom: '0.25rem' } }, '⚠️'),
          'Playback failed'
        ),
        h('video', {
          ref: videoRef,
          className: 'multiview-video',
          playsInline: true,
          autoPlay: true,
          muted: isMuted
        }),
        h('div', { className: 'slot-controls' },
          h('button', {
            className: 'btn btn-ghost btn-sm',
            style: { padding: '0.2rem 0.4rem', fontSize: '0.7rem', color: '#fff', background: isMuted ? 'rgba(231, 76, 60, 0.7)' : 'rgba(46, 204, 113, 0.7)', border: 'none' },
            onClick: () => setIsMuted(!isMuted)
          }, isMuted ? '🔇 Muted' : '🔊 Unmuted'),
          h('button', {
            className: 'btn btn-ghost btn-sm',
            style: { padding: '0.2rem 0.4rem', fontSize: '0.7rem', color: '#fff', background: 'rgba(0,0,0,0.5)', border: 'none' },
            onClick: onRemove
          }, '✕ Remove')
        )
      );
    }

      const fetchMedia = async (attempt = 0) => {
        // Tag this request; if a newer one starts, this one's results are ignored.
        const seq = ++fetchSeqRef.current;
        const stale = () => seq !== fetchSeqRef.current;
        setItems([]);
        setTotal(0);
        setLoading(true);
        let willRetry = false;
        try {
          if (activeTab === 'search') {
            if (!debSearch) {
              setSearchResults({live:[], movies:[], series:[]});
              setItems([]);
              setTotal(0);
              setTotalPages(1);
              setLoading(false);
              return;
            }
            const r = await apiFetch(`/api/search?q=${encodeURIComponent(debSearch)}`);
            if (stale()) return;
            if (r.ok) {
              const d = await r.json();
              if (stale()) return;
              setSearchResults(d);
              const totalMatches = (d.live?.length || 0) + (d.movies?.length || 0) + (d.series?.length || 0);
              setTotal(totalMatches);
              setTotalPages(1);
            } else {
              setSearchResults({live:[], movies:[], series:[]});
            }
          } else if (activeTab === 'multiview') {
            setItems([]);
            setTotal(0);
            setTotalPages(1);
          } else if (activeTab === 'favorites' || activeTab === 'recents' || activeTab === 'library') {
            const endpoint = activeTab === 'library' ? '/api/library' : `/api/${activeTab}`;
            const r = await apiFetch(endpoint);
            if (stale()) return;
            if (r.ok) {
              const d = await r.json();
              if (stale()) return;
              const rawItems = d.items || [];
              let filtered = rawItems;
              if (debSearch) {
                const q = debSearch.toLowerCase();
                filtered = filtered.filter(item => item.name && item.name.toLowerCase().includes(q));
              }
              const total = filtered.length;
              const pages = Math.max(1, Math.ceil(total / LIMIT));
              const startIdx = (page - 1) * LIMIT;
              setItems(filtered.slice(startIdx, startIdx + LIMIT));
              setTotalPages(pages);
              setTotal(total);
            } else {
              setItems([]);
              setTotalPages(1);
              setTotal(0);
            }
          } else {
            const ep = activeTab==='movies' ? 'movies' : activeTab==='series' ? 'series' : 'live';
            const params = new URLSearchParams({query:debSearch, page, limit:LIMIT});
            if (catFilter) params.set('category_id', catFilter);
            if (sortFilter && (activeTab === 'movies' || activeTab === 'series')) {
              params.set('sort_by', sortFilter);
            }
            const r = await apiFetch(`/api/${ep}?${params}`);
            if (stale()) return;
            if (r.ok) {
              const d = await r.json();
              if (stale()) return;
              const list = d.movies||d.series||d.channels||[];
              // Provider sometimes returns nothing on a transient hiccup — auto-retry
              // a couple of times (bypassing the empty result) before showing "empty".
              if (list.length === 0 && !debSearch && !catFilter && attempt < 2) {
                willRetry = true;
                setTimeout(() => fetchMedia(attempt + 1), 1200);
              } else {
                setItems(list);
                setTotalPages(d.pages||1);
                setTotal(d.total||0);
              }
            } else {
              setItems([]);
              setTotalPages(1);
              setTotal(0);
            }
          }
        } catch(e) {
          if (stale()) return;
          setItems([]);
          setTotalPages(1);
          setTotal(0);
          toast(`Error loading ${activeTab}`,'error');
        }
        finally { if (!willRetry && !stale()) setLoading(false); }
      };
