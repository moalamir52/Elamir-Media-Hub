                h('div', {style:{marginTop:'1rem'}}, h('button', {type:'submit',className:'btn btn-indigo'}, '💾 Save Settings'))
              ),

              // App Lock Section (password gate for network devices)
              h('div', {style:{borderTop:'1px solid var(--border)',paddingTop:'1rem',marginTop:'1rem'}},
                h('h4', {style:{fontSize:'0.85rem',fontWeight:700,marginBottom:'0.25rem'}},
                  `🔒 App Lock — Network Devices ${authState.locked ? '(Enabled ✓)' : '(Disabled)'}`),
                h('p', {style:{fontSize:'0.72rem',color:'var(--text-sub)',marginBottom:'0.6rem'}},
                  'Require a password when opening the app from other devices on the network. This computer always opens without a password.'),
                h('div', {style:{display:'flex',gap:'0.5rem',flexWrap:'wrap',alignItems:'center'}},
                  h('input', {className:'form-input',type:'password',value:lockPw,placeholder:authState.locked?'New password (to change)':'Set a password',style:{flex:'1',minWidth:'180px'},onChange:e=>setLockPw(e.target.value)}),
                  h('button', {type:'button',className:'btn btn-indigo',onClick:()=>handleSetAppPassword(false)}, authState.locked?'Change':'Enable'),
                  authState.locked && h('button', {type:'button',className:'btn btn-ghost',onClick:()=>handleSetAppPassword(true)}, 'Disable')
                )
              ),

              // DNS Section (bypass ISP blocking of the IPTV provider)
              h('div', {style:{borderTop:'1px solid var(--border)',paddingTop:'1rem',marginTop:'1rem'}},
                h('h4', {style:{fontSize:'0.85rem',fontWeight:700,marginBottom:'0.25rem'}}, '🌐 DNS'),
                h('p', {style:{fontSize:'0.72rem',color:'var(--text-sub)',marginBottom:'0.7rem'}},
                  'Switch DNS to bypass ISP blocking/throttling of your IPTV provider.' +
                  (dnsInfo && dnsInfo.system && dnsInfo.system.length ? ' — Current system DNS: ' + dnsInfo.system.join(', ') : '')),
                h('div', {style:{marginBottom:'0.8rem'}},
                  h('div', {style:{fontSize:'0.75rem',fontWeight:700,color:'var(--text-sub)',marginBottom:'0.35rem'}}, '💻 Whole system (needs Admin)'),
                  h('div', {style:{display:'flex',gap:'0.4rem',flexWrap:'wrap'}},
                    [['auto','Auto'],['cloudflare','Cloudflare'],['google','Google'],['adguard','AdGuard'],['quad9','Quad9']].map(o =>
                      h('button', {key:o[0],type:'button',disabled:dnsBusy,
                        className:`btn btn-sm ${dnsInfo && dnsInfo.systemProvider===o[0] ? 'btn-indigo':'btn-ghost'}`,
                        onClick:()=>setDns('system',o[0])}, o[1]))
                  )
                ),
                h('div', null,
                  h('div', {style:{fontSize:'0.75rem',fontWeight:700,color:'var(--text-sub)',marginBottom:'0.35rem'}}, '📡 Streaming only (no Admin needed)'),
                  h('div', {style:{display:'flex',gap:'0.4rem',flexWrap:'wrap'}},
                    [['auto','Off'],['cloudflare','Cloudflare'],['google','Google'],['adguard','AdGuard'],['quad9','Quad9']].map(o => {
                      const appVal = dnsInfo ? dnsInfo.app : 'off';
                      const active = (o[0]==='auto') ? (appVal==='off') : (appVal===o[0]);
                      return h('button', {key:o[0],type:'button',disabled:dnsBusy,
                        className:`btn btn-sm ${active ? 'btn-indigo':'btn-ghost'}`,
                        onClick:()=>setDns('app',o[0])}, o[1]);
                    })
                  )
                )
              ),

              // Proxy / Tunnel Section (route provider traffic to bypass ISP interference)
              h('div', {style:{borderTop:'1px solid var(--border)',paddingTop:'1rem',marginTop:'1rem'}},
                h('h4', {style:{fontSize:'0.85rem',fontWeight:700,marginBottom:'0.25rem'}},
                  `🛡️ Proxy / Tunnel ${proxyUrl ? '(Enabled ✓)' : '(Disabled)'}`),
                h('p', {style:{fontSize:'0.72rem',color:'var(--text-sub)',marginBottom:'0.6rem'}},
                  'Route all provider traffic through your proxy/VPN so the ISP only sees an encrypted connection — defeats throttling, connection resets (RST) and IP blocking.'),
                h('div', {style:{display:'flex',gap:'0.5rem',flexWrap:'wrap',alignItems:'center'}},
                  h('input', {className:'form-input',type:'text',value:proxyUrl,
                    placeholder:'http://host:port  or  http://user:pass@host:port',
                    style:{flex:'1',minWidth:'220px'},onChange:e=>setProxyUrl(e.target.value)}),
                  h('button', {type:'button',disabled:proxyBusy,className:'btn btn-indigo',onClick:()=>saveProxy(proxyUrl)}, 'Save'),
                  h('button', {type:'button',disabled:proxyBusy,className:'btn btn-ghost',onClick:testProxy}, 'Test'),
                  proxyUrl && h('button', {type:'button',disabled:proxyBusy,className:'btn btn-ghost',style:{color:'var(--red)'},onClick:()=>{setProxyUrl('');saveProxy('');}}, 'Disable')
                )
              ),

              // Software Update Section
              h('div', {
                style: {
                  borderTop: '1px solid var(--border)',
                  paddingTop: '1rem',
                  marginTop: '1rem',
                  display: 'flex',
                  justifyContent: 'space-between',
                  alignItems: 'center'
                }
              },
                h('div', null,
                  h('h4', {style:{fontSize:'0.85rem',fontWeight:700}}, `💾 Software Update ${appVersion ? '(Current: v' + appVersion + ')' : ''}`),
                  h('p', {style:{fontSize:'0.72rem',color:'var(--text-sub)'}}, 'Check and download the latest version from GitHub.')
                ),
                h('button', {
                  type: 'button',
                  className: `btn ${updating ? 'btn-ghost' : 'btn-indigo'}`,
                  style: { color: updating ? 'var(--text-dim)' : '#fff' },
                  disabled: updating,
                  onClick: handleUpdate
                }, updating ? 'Updating...' : 'Check for Updates')
              ),

              // Data & Cache Management Section
              h('div', {
                style: {
                  borderTop: '1px solid var(--border)',
                  paddingTop: '1rem',
                  marginTop: '1rem',
                  display: 'flex',
                  justifyContent: 'space-between',
                  alignItems: 'center'
                }
              },
                h('div', null,
                  h('h4', {style:{fontSize:'0.85rem',fontWeight:700}}, '🧹 Data & Cache Management'),
                  h('p', {style:{fontSize:'0.72rem',color:'var(--text-sub)'}}, 'Clear locally cached channels, movies, and series lists to force a fresh reload.')
                ),
                h('button', {
                  type: 'button',
                  className: 'btn btn-ghost btn-sm',
                  style: { color: 'var(--indigo)', borderColor: 'var(--border-indigo)' },
                  onClick: async () => {
                    try {
                      const r = await apiFetch('/api/creds', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(creds)
                      });
                      if (r.ok) {
                        toast('Cache cleared successfully! Reloading lists...', 'success');
                        setTimeout(() => {
                          setPage(1);
                          loadCats();
                          fetchMedia();
                        }, 500);
                      } else {
                        toast('Failed to clear cache', 'error');
                      }
                    } catch (e) {
                      toast('Error clearing cache', 'error');
                    }
                  }
                }, 'Clear Cache')
              )
            );
          })(),





          // Section Header
          activeTab !== 'multiview' && h('div', {className:'section-bar'},
            h('div', null,
              h('h2', {className:'section-title'},
                activeTab==='movies' ? t('titleMovies') : activeTab==='series' ? t('titleSeries') : activeTab==='live' ? t('titleLive') : activeTab==='favorites' ? t('titleFavorites') : activeTab==='library' ? t('titleLibrary') : activeTab === 'search' ? t('titleSearch') : t('titleRecent')
              ),
              total > 0 && h('span', {className:'section-count'}, `${total.toLocaleString()} items found`)
            ),
            activeTab === 'library' && h('button', {
              className: 'btn btn-indigo btn-sm',
              onClick: handleImportLibrary,
              style: { marginLeft: 'auto' }
            }, '📥 Import Video'),
            activeTab === 'recents' && total > 0 && h('button', {
              className: 'btn btn-ghost btn-sm',
              style: { color: 'var(--red)', borderColor: 'hsla(4,82%,52%,0.3)', marginLeft: 'auto' },
              onClick: handleClearAllRecents
            }, '🗑️ Clear History')
          ),

          // Grid or List or Custom Views
          activeTab === 'search'
            ? h('div', { key: 'view-search', className: 'search-view' },
                !debSearch && h('div', { className: 'empty-state' },
                  h('span', { className: 'empty-state-icon' }, '🔍'),
                  h('p', null, 'Type in the search box to query movies, series, and channels globally.')
                ),
                debSearch && loading && h('div', { className: 'spinner-wrap' }, h('div', { className: 'spinner' }), h('p', { className: 'spinner-label' }, 'Searching...')),
                debSearch && !loading && (searchResults.live?.length === 0 && searchResults.movies?.length === 0 && searchResults.series?.length === 0) && h('div', { className: 'empty-state' },
                  h('span', { className: 'empty-state-icon' }, '🔍'),
                  h('p', null, `No results found for "${debSearch}"`)
                ),
                debSearch && !loading && h('div', { style: { display: 'flex', flexDirection: 'column', gap: '2rem' } },
                  searchResults.live?.length > 0 && h('div', { className: 'search-section' },
                    h('h3', { className: 'search-section-title' }, '📡 Live Channels'),
                    h('div', { className: 'media-grid' },
                      searchResults.live.map(item => h(MediaCard, {
                        key: `live_${item.stream_id}`,
                        item, type: 'live',
                        isFav: isFavorite(item.stream_id, 'live'),
                        onToggleFav: () => toggleFavorite(item, 'live'),
                        onClick: (i) => setDetailItem(i),
                        autoCheck: autoCheck !== 'disabled',
                        checkTriggerToken: checkTriggerToken
                      }))
                    )
                  ),
                  searchResults.movies?.length > 0 && h('div', { className: 'search-section' },
                    h('h3', { className: 'search-section-title' }, '🎬 Movies'),
                    h('div', { className: 'media-grid' },
                      searchResults.movies.map(item => h(MediaCard, {
                        key: `movie_${item.stream_id}`,
                        item, type: 'movie',
                        isFav: isFavorite(item.stream_id, 'movie'),
                        onToggleFav: () => toggleFavorite(item, 'movie'),
                        onClick: (i) => setDetailItem(i),
                        progress: playbackProgressMap[String(item.stream_id)]
                      }))
                    )
                  ),
                  searchResults.series?.length > 0 && h('div', { className: 'search-section' },
                    h('h3', { className: 'search-section-title' }, '📺 TV Series'),
                    h('div', { className: 'media-grid' },
                      searchResults.series.map(item => h(MediaCard, {
                        key: `series_${item.series_id}`,
                        item, type: 'series',
                        isFav: isFavorite(item.series_id, 'series'),
                        onToggleFav: () => toggleFavorite(item, 'series'),
                        onClick: (i) => setSeriesItem(i),
                        progress: playbackProgressMap[String(item.series_id)]
                      }))
                    )
                  )
                )
              )
            : activeTab === 'multiview'
              ? h('div', { key: 'view-multiview', className: 'multiview-container' },
                  h('div', { className: 'multiview-layout-bar' },
                    h('div', { style: { display: 'flex', gap: '0.5rem', alignItems: 'center' } },
                      h('span', { style: { fontWeight: 600, fontSize: '0.9rem' } }, 'Layout:'),
                      h('button', {
                        className: `btn btn-sm ${mvLayout === '2' ? 'btn-indigo' : 'btn-ghost'}`,
                        onClick: () => setMvLayout('2')
                      }, 'Side-by-Side (2 slots)'),
                      h('button', {
                        className: `btn btn-sm ${mvLayout === '4' ? 'btn-indigo' : 'btn-ghost'}`,
                        onClick: () => setMvLayout('4')
                      }, 'Quad Screen (4 slots)')
                    ),
                    h('button', {
                      className: 'btn btn-ghost btn-sm',
                      style: { color: 'var(--red)', borderColor: 'var(--red)' },
                      onClick: () => setMvSlots([null, null, null, null])
                    }, '🧹 Clear All Slots')
                  ),
                  h('div', { className: `multiview-grid layout-${mvLayout}` },
                    (mvLayout === '2' ? [0, 1] : [0, 1, 2, 3]).map(slotIdx => {
                      const channel = mvSlots[slotIdx];
                      return h('div', { key: slotIdx, className: `multiview-slot ${channel ? 'active' : ''}` },
                        channel
                          ? h(MultiViewPlayer, {
                              slotIdx,
                              channel,
                              creds,
                              onRemove: () => {
                                const newSlots = [...mvSlots];
                                newSlots[slotIdx] = null;
                                setMvSlots(newSlots);
                              }
                            })
                          : h('div', { className: 'slot-empty', onClick: () => setMvPickerOpen(slotIdx) },
                              h('span', null, '➕'),
                              h('p', null, `Click to Add Channel to Slot ${slotIdx + 1}`)
                            )
                      );
                    })
                  ),
                  mvPickerOpen !== null && h(ChannelPickerModal, {
                    creds,
                    onClose: () => setMvPickerOpen(null),
                    onSelect: (ch) => {
                      const newSlots = [...mvSlots];
                      newSlots[mvPickerOpen] = ch;
                      setMvSlots(newSlots);
                      setMvPickerOpen(null);
                    }
                  })
                )
              : loading
                ? h('div', {key:'view-loading', className:'spinner-wrap'}, h('div',{className:'spinner'}), h('p',{className:'spinner-label'},'Loading...'))
                : items.length > 0
                  ? activeTab === 'library'
                    ? h('div', {key:'view-library', className:'library-list'},
                        items.map(item => h(LibraryItem, {
                          key: item.name,
                          item,
                          onWatch: () => handleWatchLibrary(item),
                          onDelete: () => handleDeleteLibrary(item),
                          onClear: () => handleClearLibrary(item)
                        }))
                      )
                    : h('div', {key:'view-grid', className:'media-grid'},
                        items.map((item, idx) => {
                          const itemType = activeTab==='movies'?'movie':activeTab==='series'?'series':activeTab==='live'?'live':(item.type || 'unknown');
                          const itemId = item.stream_id || item.series_id || item.id || `idx_${idx}`;
                          return h(MediaCard, {
                            key: `${itemType}_${itemId}`,
                            item, type: itemType,
                            isFav: isFavorite(itemId, itemType),
                            onToggleFav: () => toggleFavorite(item, itemType),
                            catName: catNameFor(item),
                            onRemove: activeTab === 'recents' ? () => handleRemoveRecent(item, itemType) : null,
                            onClick: (i) => {
                              if (activeTab === 'recents') {
                                if (itemType === 'series') {
                                  setSeriesItem(i);
                                } else {
                                  const playlistItems = items.filter(itm => itm.type !== 'series');
                                  const playlist = playlistItems.map(itm => {
                                    const itmId = itm.stream_id || itm.id;
                                    const itmType = itm.type || (itm.stream_id ? 'movie' : 'live');
                                    let itmUrl = '';
                                    if (itmType === 'movie' || itmType === 'live') {
                                      itmUrl = streamSrc(itmType, itmId);
                                    }
                                    return {
                                      title: itm.name,
                                      url: itmUrl,
                                      streamId: itmId,
                                      isLive: itmType === 'live',
                                      type: itmType,
                                      rawItem: itm,
                                      streamIcon: itm.stream_icon
                                    };
                                  });
                                  const targetId = i.stream_id || i.id;
                                  const plIdx = playlistItems.findIndex(itm => (itm.stream_id || itm.id) === targetId);
                                  handleWatch(i, itemType, null, null, playlist, plIdx >= 0 ? plIdx : 0);
                                }
                              } else {
                                (itemType === 'series') ? setSeriesItem(i) : setDetailItem(i);
                              }
                            },
                            autoCheck: autoCheck !== 'disabled',
                            checkTriggerToken: checkTriggerToken,
                            progress: playbackProgressMap[String(itemId)]
                          });
                        })
                      )
                  : h('div', {key:'view-empty', className:'empty-state'}, h('span',{className:'empty-state-icon'},'📂'), h('p',null, activeTab === 'library' ? t('emptyLibrary') : t('emptyGeneric'))),
          
          !['search', 'multiview'].includes(activeTab) && h(Pagination, {page, pages:totalPages, total, onPage:setPage})
        ),

        // ── Download Bar (Fixed, always visible) ──
        downloads.length > 0 && h(DownloadBar, {downloads, onCancel:handleCancelDownload, onClear:handleClearDownload, onResume:handleResumeDownload}),

        // ── Modals ──
        detailItem && h(ItemDetailModal, {
          item:detailItem,
          type: activeTab==='live'?'live':activeTab==='movies'?'movie':detailItem.type,
          creds, catName:catNameFor(detailItem),
          isFav: isFavorite(detailItem.stream_id || detailItem.id, activeTab==='live'?'live':activeTab==='movies'?'movie':detailItem.type),
          onToggleFav: () => toggleFavorite(detailItem, activeTab==='live'?'live':activeTab==='movies'?'movie':detailItem.type),
          onClose:()=>setDetailItem(null),
          onDownload:handleDownload,
          onRecord:handleRecord,
          onSelectCategory: handleSelectCategory,
          onWatch: () => {
            const targetType = activeTab === 'live' ? 'live' : activeTab === 'movies' ? 'movie' : detailItem.type;
            let playlistItems = items;
            if (activeTab === 'favorites' || activeTab === 'recents') {
              playlistItems = items.filter(itm => itm.type !== 'series');
            }
            
            const playlist = playlistItems.map(itm => {
              const itmId = itm.stream_id || itm.id;
              const itmType = itm.type || targetType;
              let itmUrl = '';
              if (itmType === 'movie' || itmType === 'live') {
                itmUrl = streamSrc(itmType, itmId);
              }
              return {
                title: itm.name,
                url: itmUrl,
                streamId: itmId,
                isLive: itmType === 'live',
                type: itmType,
                rawItem: itm,
                streamIcon: itm.stream_icon
              };
            });
            
            const targetId = detailItem.stream_id || detailItem.id;
            const idx = playlistItems.findIndex(itm => (itm.stream_id || itm.id) === targetId);
            
            handleWatch(detailItem, targetType, null, null, playlist, idx >= 0 ? idx : 0);
          }
        }),
        seriesItem && h(SeriesModal, {
          item:seriesItem, creds, catName:catNameFor(seriesItem),
          isFav: isFavorite(seriesItem.series_id || seriesItem.id, 'series'),
          onToggleFav: () => toggleFavorite(seriesItem, 'series'),
          onClose:()=>setSeriesItem(null),
          onDownload:handleDownload,
          onDownloadSeries:handleDownloadSeries,
          onSelectCategory: handleSelectCategory,
          onWatch: (idx, episodesList, seasonNum) => {
            const playlist = episodesList.map(ep => {
              const code = `S${String(seasonNum).padStart(2,'0')}E${String(ep.episode_num||ep.id||0).padStart(2,'0')}`;
              const title = ep.title || `Episode ${ep.episode_num || ep.id}`;
              const fname = `${seriesItem.name} - ${code}`;
              const epUrl = streamSrc('series', ep.id);
              return {
                title: fname,
                url: epUrl,
                streamId: ep.id,
                isLive: false,
                type: 'series',
                season: seasonNum,
                rawItem: ep,
                parentItem: seriesItem,
                streamIcon: seriesItem.stream_icon
              };
            });
            
            const currentEp = episodesList[idx];
            const code = `S${String(seasonNum).padStart(2,'0')}E${String(currentEp.episode_num||currentEp.id||0).padStart(2,'0')}`;
            const title = currentEp.title || `Episode ${currentEp.episode_num || currentEp.id}`;
            const fname = `${seriesItem.name} - ${code}`;
            const epUrl = streamSrc('series', currentEp.id);
            
            handleWatch(seriesItem, 'series', fname, epUrl, playlist, idx);
          }
        }),
        playerState && h(VideoPlayer, {
          title:playerState.title, url:playerState.url,
          streamId:playerState.streamId, isLive:playerState.isLive,
          streamIcon: playerState.streamIcon,
          downloads:downloads, onRecord:handleRecord, onCancelRecord:handleCancelDownload,
          onClose:()=>setPlayerState(null),
          onNext: playNext,
          onPrev: playPrev,
          hasNext: activePlaylist && activePlaylist.length > 1,
          hasPrev: activePlaylist && activePlaylist.length > 1,
          activeTab: activeTab,
          toast: toast,
          onEnded: () => {
            if (activePlaylist && activePlaylistIndex >= 0 && activePlaylistIndex < activePlaylist.length - 1) {
              playPlaylistIndex(activePlaylistIndex + 1);
            }
          },
          onPipChange: setPipActive
        }),

        // ── Picture-in-Picture: prompt when starting new playback while one is mini ──
        pendingPlay && h('div', { className: 'modal-backdrop', onClick: () => setPendingPlay(null) },
          h('div', { className: 'modal-box', onClick: e => e.stopPropagation(), style: { maxWidth: '420px' } },
            h('div', { style: { padding: '1.5rem', display: 'flex', flexDirection: 'column', gap: '1rem' } },
              h('div', { style: { textAlign: 'center', fontSize: '2rem' } }, '🗗'),
              h('h3', { style: { textAlign: 'center', margin: 0, color: 'var(--text-main)', fontSize: '1.05rem' } }, 'Something is playing in Mini player'),
              h('p', { style: { textAlign: 'center', margin: 0, color: 'var(--text-sub)', fontSize: '0.85rem' } }, `Do you want to open "${pendingPlay[0] && pendingPlay[0].name || 'this'}"?`),
              h('div', { style: { display: 'flex', flexDirection: 'column', gap: '0.5rem', marginTop: '0.5rem' } },
                h('button', {
                  className: 'btn btn-indigo', style: { width: '100%' },
                  onClick: () => {
                    const a = pendingPlay; setPendingPlay(null); setPipActive(false);
                    if (document.pictureInPictureElement) document.exitPictureInPicture().catch(()=>{});
                    handleWatch(a[0], a[1], a[2], a[3], a[4], a[5], true);
                  }
                }, '🔄 Replace what\'s playing'),
                h('button', {
                  className: 'btn btn-gold', style: { width: '100%' },
                  onClick: () => {
                    const p = pendingPlay;
                    // Slot for the item already playing (in the Mini player)
                    const curSlot = playerState
                      ? { name: playerState.title, url: playerState.url, stream_id: playerState.streamId }
                      : null;
                    // Slot for the newly chosen item (build its playable URL)
                    const newName = p[2] || (p[0] && p[0].name) || 'Stream';
                    const newUrl = p[3] || streamSrc(p[1], (p[0] && (p[0].stream_id || p[0].id)));
                    // Close everything first so no leftover screen stays on top, and
                    // release the current player's connection before opening the slots.
                    setDetailItem(null);
                    setSeriesItem(null);
                    setPendingPlay(null);
                    if (document.pictureInPictureElement) document.exitPictureInPicture().catch(()=>{});
                    setPipActive(false);
                    setPlayerState(null);
                    setMvSlots([null, null, null, null]);
                    setMvLayout('2');
                    setActiveTab('multiview');
                    setPage(1);
                    // Mount the slots after the previous connection has been released
                    // (avoids a transient over-limit that leaves a slot black).
                    setTimeout(() => {
                      const slots = [null, null, null, null];
                      let idx = 0;
                      if (curSlot) { slots[idx++] = curSlot; }
                      slots[idx] = { name: newName, url: newUrl };
                      setMvSlots(slots);
                    }, 600);
                  }
                }, '🖥️ Open both in Multi-View'),
                h('button', {
                  className: 'btn btn-ghost', style: { width: '100%' },
                  onClick: () => setPendingPlay(null)
                }, 'Cancel — keep watching')
              )
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
  </script>
</body>
</html>
